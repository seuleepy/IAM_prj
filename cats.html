<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만 고양이 없어</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
        
        body { background: #0a0a0a; color: #fff; font-family: 'Space Mono', monospace; }
        .grid-bg { 
            background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px); 
            background-size: 40px 40px; 
        }

        .cat-card {
            border: 2px solid #fff;
            padding: 12px;
            background: #111;
            transition: all 0.3s ease;
            box-shadow: 6px 6px 0px #000;
        }

        .cat-card:hover {
            transform: translate(-4px, -4px);
            box-shadow: 10px 10px 0px #ccff00;
        }

        .cta-btn {
            border: 2px solid #fff;
            padding: 12px 24px;
            transition: all 0.2s;
            display: inline-block;
        }
        .cta-btn:hover { background: #fff; color: #000; }

        /* Modal Styles */
        .modal {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100dvh;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        .modal-content {
            background: #000;
            border: 2px solid #fff;
            padding: 24px;
            width: 100%;
            max-width: 600px;
            max-height: 90dvh;
            overflow-y: auto;
            position: relative;
        }

        #modal-body img {
            width: 100%;
            height: auto;
            object-fit: contain;
            margin-bottom: 10px;
        }
    </style>
</head>
<body class="grid-bg min-h-screen p-8">
    
    <nav class="fixed top-0 left-0 p-8 z-50 flex gap-6 text-sm mix-blend-difference pointer-events-auto text-white">
        <a href="index.html" class="hover:text-lime-400">[ > 홈 ]</a>
        <a href="cats.html" class="hover:text-lime-400">[ > 고양이 구경하기 ]</a>
        <a href="game.html" class="hover:text-lime-400">[ > 둘이서 게임하기 ]</a>
    </nav>

    <div class="pt-24">
        <header class="mb-16">
            <h1 class="text-5xl font-black mb-4">CAT_PROFILE_ARCHIVE</h1>
            <p class="text-gray-400">8 FILES LOADED. SEARCHING FOR MORE...</p>
        </header>

        <div id="cat-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
            <!-- Cards injected via JS -->
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <button onclick="closeModal()" class="absolute top-2 right-2 text-white">[ × ]</button>
            <div id="modal-body" class="grid grid-cols-2 gap-4"></div>
        </div>
    </div>

    <script>
        const CATS = [
            { id: 'cat.lucky.zip', name: '럭키', desc: 'FOUND IN ABANDONED BOX.', profileImage: getCatImageUrl('lucky', 'profile.jpg'), instagramUrl: 'https://www.instagram.com/cat.lucky.zip/', detailImages: [getCatImageUrl('lucky', '0.jpg'), getCatImageUrl('lucky', '1.jpg')] },
            { id: '_cat_nyang2', name: '이냥', desc: 'SIGNAL DETECTED.', profileImage: getCatImageUrl('nyang2', 'profile.jpg'), instagramUrl: 'https://www.instagram.com/_cat_nyang2/', detailImages: [getCatImageUrl('nyang2', '0.jpg'), getCatImageUrl('nyang2', '1.jpg')] },
            { id: 'cat.chodang', name: '초당', desc: 'STRAY CAT PROTOCOL.', profileImage: getCatImageUrl('chodang', 'profile.jpg'), instagramUrl: 'https://www.instagram.com/cat.chodang/', detailImages: [getCatImageUrl('chodang', '0.jpg'), getCatImageUrl('chodang', '1.jpg')] },
            { id: 'dou.o.dou', name: '두두', desc: 'UNKNOWN ORIGIN.', profileImage: getCatImageUrl('doudou', 'profile.jpg'), instagramUrl: 'https://www.instagram.com/dou.o.dou/', detailImages: [getCatImageUrl('doudou', '0.jpg'), getCatImageUrl('doudou', '1.jpg')] },
            { id: 'korean_headache_cat', name: '개보름', desc: 'ERROR CODE: MEOW.', profileImage: getCatImageUrl('headache', 'profile.jpg'), instagramUrl: 'https://www.instagram.com/korean_headache_cat/', detailImages: [getCatImageUrl('headache', '0.jpg'), getCatImageUrl('headache', '1.jpg')] },
            { id: 'british_bboddo', name: '뽀또', desc: 'SYSTEM OVERRIDE.', profileImage: getCatImageUrl('bboddo', 'profile.jpg'), instagramUrl: 'https://www.instagram.com/british_bboddo/', detailImages: [getCatImageUrl('bboddo', '0.jpg'), getCatImageUrl('bboddo', '1.jpg')] },
            { id: 'cat_urgry', name: '억울이', desc: 'WAITING FOR CONNECTION.', profileImage: getCatImageUrl('urgry', 'profile.jpg'), instagramUrl: 'https://www.instagram.com/cat_urgry/', detailImages: [getCatImageUrl('urgry', '0.jpg'), getCatImageUrl('urgry', '1.jpg')] },
            { id: 'sobbang_cat', name: '심소빵', desc: 'LAST SIGNAL RECEIVED.', profileImage: getCatImageUrl('sobbang', 'profile.jpg'), instagramUrl: 'https://www.instagram.com/sobbang_cat/', detailImages: [getCatImageUrl('sobbang', '0.jpg'), getCatImageUrl('sobbang', '1.jpg')] }
        ];

        function getCatImageUrl(dirName, fileName) {
            return `assets/images/${dirName}/${fileName}`;
        }

        const grid = document.getElementById('cat-grid');
        const modal = document.getElementById('modal');
        const modalBody = document.getElementById('modal-body');

        function openModal(images) {
            modalBody.innerHTML = images.map(img => `<img src="${img}" class="w-full h-auto border border-gray-700" onerror="this.src='https://placehold.co/400x400/333/fff?text=IMG_ERR'">`).join('');
            modal.classList.remove('hidden');
        }

        function closeModal() {
            modal.classList.add('hidden');
        }

        CATS.forEach(cat => {
            const card = document.createElement('div');
            card.className = 'cat-card';
            card.innerHTML = `
                <img src="${cat.profileImage}" class="w-full h-64 object-contain bg-black mb-4 border border-gray-700" alt="${cat.name}" onerror="this.src='https://placehold.co/400x400/333/fff?text=IMG_ERR'">
                <h2 class="font-bold text-lg">${cat.name}</h2>
                <p class="text-xs text-lime-400 mt-2">${cat.desc}</p>
                <div class="mt-4 flex gap-2">
                    <a href="${cat.instagramUrl}" target="_blank" class="text-[10px] bg-gray-800 px-2 py-1 hover:bg-white hover:text-black">INSTAGRAM</a>
                    <button onclick='openModal(${JSON.stringify(cat.detailImages)})' class="text-[10px] border border-gray-600 px-2 py-1 hover:border-white">DETAILS</button>
                </div>
                <div class="mt-4 border-t border-gray-800 pt-2 text-[10px] text-gray-500">ID: ${cat.id.toUpperCase()}</div>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
